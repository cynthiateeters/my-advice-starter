# Netlify reads this file to know how to build and deploy your site.
# See docs/tutorials/project-structure.md for how this fits into the build pipeline.

[build]
  # The command Netlify runs on its servers to produce your site.
  # This calls "vite build", which bundles your code into dist/.
  command = "npm run build"

  # The folder Netlify uploads to its CDN.
  # Only files inside this folder are deployed — everything else stays behind.
  # Your docs/, reports/, AGENTS.md, and config files never reach the server.
  publish = "dist"

  # Skip rebuilding when only non-site files changed (docs, config, markdown).
  # Netlify runs this command — if it exits 0 (no diff), the build is skipped.
  # This saves build minutes and avoids unnecessary deploys.
  ignore = "git diff --quiet HEAD^ HEAD -- index.html src/ public/"

# Pin the Node.js version so the build behaves the same as your local machine.
[build.environment]
  NODE_VERSION = "20"
